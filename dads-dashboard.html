<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dad's Performance Dashboard</title>
  <meta name="description" content="Gamified dark mode habit and RPG level tracker — birthday gift." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans:['Inter','system-ui','sans-serif'], mono:['JetBrains Mono','monospace'] } } }
    };
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body,#root{height:100%;margin:0;padding:0;background:#0d0e12;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#161820}::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:3px}

    /* ─── Text / Shimmer ─────────────────────────── */
    .shimmer-text{background:linear-gradient(90deg,#00d4ff 0%,#10ffd4 25%,#3b82f6 50%,#00d4ff 75%,#10ffd4 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .xp-shimmer-text{background:linear-gradient(90deg,#10ffd4 0%,#00d4ff 40%,#a855f7 70%,#10ffd4 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}

    /* ─── Keyframes ──────────────────────────────── */
    @keyframes flicker{0%,100%{opacity:1;transform:scale(1) rotate(-2deg)}25%{opacity:.85;transform:scale(1.05) rotate(2deg)}50%{opacity:.95;transform:scale(.97) rotate(-1deg)}75%{opacity:.9;transform:scale(1.03) rotate(1deg)}}
    @keyframes fadeUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
    @keyframes slideDown{0%{transform:translateY(-16px);opacity:0}100%{transform:translateY(0);opacity:1}}
    @keyframes bannerDrop{0%{transform:translateY(-120%) scale(.9);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
    @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(0,212,255,.5)}70%{box-shadow:0 0 0 20px rgba(0,212,255,0)}100%{box-shadow:0 0 0 0 rgba(0,212,255,0)}}
    @keyframes editPulse{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,.4)}50%{box-shadow:0 0 0 6px rgba(244,63,94,0)}}
    @keyframes barShimmer{0%{left:-100%}100%{left:100%}}
    @keyframes xpBarShimmer{0%{left:-100%}100%{left:200%}}
    @keyframes lvlPulse{0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,.6)}60%{box-shadow:0 0 0 18px rgba(168,85,247,0)}}
    @keyframes xpFloat{0%{opacity:0;transform:translateX(-50%) translateY(0) scale(.7)}12%{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1.15)}75%{opacity:1;transform:translateX(-50%) translateY(-52px) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-72px) scale(.85)}}
    @keyframes levelUpDrop{0%{transform:scale(.5) translateY(40px);opacity:0}60%{transform:scale(1.05) translateY(-6px);opacity:1}80%{transform:scale(.97) translateY(2px)}100%{transform:scale(1) translateY(0);opacity:1}}
    @keyframes streakBreak{0%{transform:scale(1)}30%{transform:scale(1.2) rotate(-8deg)}60%{transform:scale(.9) rotate(6deg)}100%{transform:scale(1) rotate(0)}}

    /* ─── Utility ────────────────────────────────── */
    .flame-flicker{animation:flicker 1.4s ease-in-out infinite;display:inline-block}
    .pulse-ring{animation:pulseRing 2s ease-out infinite}
    .edit-mode-ring{animation:editPulse 2s ease-in-out infinite}
    .grid-bg{background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px}

    /* ─── Progress Ring ──────────────────────────── */
    .progress-ring-circle{transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1);transform:rotate(-90deg);transform-origin:50% 50%}

    /* ─── Habit Cards ────────────────────────────── */
    .habit-card{transition:all .3s cubic-bezier(.4,0,.2,1);position:relative}
    .habit-card.trackable{cursor:pointer}
    .habit-card::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,transparent 30%,rgba(0,212,255,.15) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;transition:all .3s ease}
    .habit-card.trackable:hover::before{background:linear-gradient(135deg,rgba(0,212,255,.3) 0%,rgba(16,255,212,.2) 100%)}
    .habit-card.completed::before{background:linear-gradient(135deg,rgba(34,197,94,.4) 0%,rgba(16,255,212,.3) 100%)}
    .habit-card.edit-mode-card::before{background:linear-gradient(135deg,rgba(244,63,94,.25) 0%,rgba(168,85,247,.2) 100%)}
    .check-btn{transition:all .25s cubic-bezier(.34,1.56,.64,1)}
    .check-btn:hover{transform:scale(1.08)}.check-btn:active{transform:scale(.93)}

    /* ─── KPI / XP Bars ──────────────────────────── */
    .kpi-bar-fill{transition:width .8s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
    .kpi-bar-fill::after{content:'';position:absolute;top:0;left:-100%;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:barShimmer 2s linear infinite}
    .xp-bar-track{background:#0d0e12;border:1px solid #2a2d3a;border-radius:9999px;overflow:hidden;height:12px;position:relative}
    .xp-bar-fill{height:100%;border-radius:9999px;position:relative;overflow:hidden;transition:width 1s cubic-bezier(.4,0,.2,1)}
    .xp-bar-fill::after{content:'';position:absolute;top:0;left:-100%;width:60%;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:xpBarShimmer 2.2s linear infinite}

    /* ─── Streak Badge ───────────────────────────── */
    .streak-badge{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(239,68,68,.1));border:1px solid rgba(245,158,11,.3)}
    .streak-broken{background:linear-gradient(135deg,rgba(244,63,94,.12),rgba(100,116,139,.08));border:1px solid rgba(244,63,94,.3)}

    /* ─── Overlays ───────────────────────────────── */
    .modal-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

    /* ─── Edit UI ────────────────────────────────── */
    .dark-input{background:#0d0e12;color:#e2e8f0;outline:none;transition:border-color .2s}
    .dark-input::placeholder{color:#475569}
    .icon-btn{width:2rem;height:2rem;border-radius:.5rem;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;cursor:pointer;border:1px solid #3a3d4a;background:#2a2d3a}
    .icon-btn:hover{transform:scale(1.12)}
    .icon-btn.selected{border-color:currentColor;background:rgba(0,212,255,.2)}
    .color-swatch{width:1.75rem;height:1.75rem;border-radius:50%;cursor:pointer;transition:all .2s;border:2px solid transparent}
    .color-swatch.selected{border-color:white;transform:scale(1.2)}
    .edit-panel{animation:slideDown .25s ease forwards}
    .del-btn{position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;z-index:10;border:2px solid #f43f5e44;background:#1e2028;color:#f43f5e}
    .del-btn:hover{background:#f43f5e;color:#fff;transform:scale(1.1)}
    .edit-badge{position:absolute;top:-8px;left:-8px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .2s;z-index:10;border:2px solid #a855f744;background:#1e2028;color:#a855f7}
    .edit-badge:hover{background:#a855f7;color:#fff;transform:scale(1.1)}

    /* ─── XP Float ───────────────────────────────── */
    .xp-float-el{position:absolute;top:35%;left:50%;animation:xpFloat 1.5s cubic-bezier(.22,1,.36,1) forwards;pointer-events:none;z-index:50;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem;color:#10ffd4;text-shadow:0 0 16px rgba(16,255,212,.9),0 0 32px rgba(16,255,212,.5);letter-spacing:.06em}

    /* ─── Level Badge ────────────────────────────── */
    .level-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:1rem;flex-shrink:0}
    .level-up-anim{animation:levelUpDrop .6s cubic-bezier(.34,1.56,.64,1) forwards}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'dads_dashboard_v4';
const TODAY = new Date().toISOString().split('T')[0];
const XP_PER_TASK = 100;
const XP_PER_LEVEL = 500;

const DAD_TITLES = [
  '',
  'Novice Grillmaster',
  'Yard Maintenance Specialist',
  'Thermostat Guardian',
  'New Balance Enthusiast',
  'Local Coffee Connoisseur',
  'DIY Advisor',
  'Master of Dad Jokes',
  'Garage Project Director',
  'Neighborhood Legend',
  'Ultimate Grandmaster Dad',
];

const LEVEL_EMOJIS = ['','🥩','🌿','🌡️','👟','☕','🔧','😄','🔨','🏘️','👑'];

const ACCENT_PALETTE = [
  { color:'#00d4ff', glow:'rgba(0,212,255,0.3)' },
  { color:'#10ffd4', glow:'rgba(16,255,212,0.3)' },
  { color:'#3b82f6', glow:'rgba(59,130,246,0.3)' },
  { color:'#a855f7', glow:'rgba(168,85,247,0.3)' },
  { color:'#f59e0b', glow:'rgba(245,158,11,0.3)' },
  { color:'#f43f5e', glow:'rgba(244,63,94,0.3)'  },
  { color:'#22c55e', glow:'rgba(34,197,94,0.3)'  },
  { color:'#ff6b35', glow:'rgba(255,107,53,0.3)' },
];

const ICON_OPTIONS = ['🏃','💪','⚡','🧘','🎯','📚','💧','🏋️','🚴','🧠','💻','🎸','🍎','🌙','☀️','🔥','⭐','🎮','✍️','🏊','🎨','🎵','🧗','🤸','🥗','🛌','🧪','🏆'];

const DEFAULT_HABITS = [
  { id:'run',  title:'Daily Conditioning Run', subtitle:'Cardio & Endurance',   icon:'🏃', accentColor:'#00d4ff', glowColor:'rgba(0,212,255,0.3)',   target:'5 km / 30 min',    category:'FITNESS',  metrics:[{label:'Distance',value:'5 km',unit:''},{label:'Pace',value:'6:00',unit:'min/km'}] },
  { id:'core', title:'Core & Ab Focus',        subtitle:'Strength & Stability', icon:'💪', accentColor:'#10ffd4', glowColor:'rgba(16,255,212,0.3)',  target:'20 min / 3 sets',  category:'STRENGTH', metrics:[{label:'Sets',value:'3',unit:''},{label:'Duration',value:'20',unit:'min'}] },
  { id:'tech', title:'Tech & Project Dev',     subtitle:'Innovation & Growth',  icon:'⚡', accentColor:'#3b82f6', glowColor:'rgba(59,130,246,0.3)', target:'60 min deep work', category:'GROWTH',   metrics:[{label:'Focus Block',value:'60',unit:'min'},{label:'Tasks',value:'3+',unit:'items'}] },
];

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════════ */
const getTitle = (level) => DAD_TITLES[Math.min(level, DAD_TITLES.length - 1)] || DAD_TITLES[DAD_TITLES.length - 1];
const getLvlEmoji = (level) => LEVEL_EMOJIS[Math.min(level, LEVEL_EMOJIS.length - 1)] || '👑';
const calcLevel = (xp) => Math.floor(xp / XP_PER_LEVEL) + 1;
const calcXpInLevel = (xp) => xp % XP_PER_LEVEL;
const calcXpPct = (xp) => (calcXpInLevel(xp) / XP_PER_LEVEL) * 100;
const genId = () => 'h_' + Math.random().toString(36).slice(2, 9);
const nextAccent = (habits) => {
  const used = new Set(habits.map(h => h.accentColor));
  return ACCENT_PALETTE.find(a => !used.has(a.color)) || ACCENT_PALETTE[habits.length % ACCENT_PALETTE.length];
};
const getYesterday = () => {
  const d = new Date(TODAY); d.setDate(d.getDate() - 1);
  return d.toISOString().split('T')[0];
};
const mkDefaultHabitState = () => ({ completedToday: false, streakCount: 0, lastCompletedDate: null });

/* ═══════════════════════════════════════════════════════════════════════════
   LOCALSTORAGE — PERSIST & RESOLVE
═══════════════════════════════════════════════════════════════════════════ */
function loadAll() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}

function saveAll(habits, hState, totalXP, userLevel) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ lastDate: TODAY, habits, habitsState: hState, totalXP, userLevel }));
  } catch {}
}

function migrateHabitState(old) {
  // Migrate from v3 format { checked, streak } → v4 { completedToday, streakCount, lastCompletedDate }
  if (!old) return mkDefaultHabitState();
  if ('completedToday' in old) return old; // already v4
  return {
    completedToday: old.checked || false,
    streakCount: old.streak || 0,
    lastCompletedDate: old.checked ? TODAY : (old.streak > 0 ? getYesterday() : null),
  };
}

function resolveAll() {
  const s = loadAll();
  if (!s) {
    const habitsState = DEFAULT_HABITS.reduce((a, h) => { a[h.id] = mkDefaultHabitState(); return a; }, {});
    return { habits: DEFAULT_HABITS, habitsState, totalXP: 0, userLevel: 1 };
  }

  const habits = (s.habits && s.habits.length) ? s.habits : DEFAULT_HABITS;
  const totalXP = typeof s.totalXP === 'number' ? s.totalXP : 0;
  const userLevel = typeof s.userLevel === 'number' ? s.userLevel : calcLevel(totalXP);
  const savedState = s.habitsState || {};

  const habitsState = {};
  for (const h of habits) {
    let st = migrateHabitState(savedState[h.id]);
    const { lastCompletedDate } = st;

    // New day → reset completedToday; check streak continuity
    if (lastCompletedDate !== TODAY) {
      st = { ...st, completedToday: false };
      if (lastCompletedDate) {
        const diffDays = Math.round((new Date(TODAY) - new Date(lastCompletedDate)) / 86400000);
        if (diffDays > 1) {
          // Missed a day — streak broken!
          st = { ...st, streakCount: 0 };
        }
        // diffDays === 1 → completed yesterday, streak lives on
      } else {
        st = { ...st, streakCount: 0 };
      }
    }
    habitsState[h.id] = st;
  }

  return { habits, habitsState, totalXP, userLevel };
}

/* ═══════════════════════════════════════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════════════════════════════════════ */
function blastCompletionConfetti() {
  const colors = ['#00d4ff','#10ffd4','#3b82f6','#f59e0b','#22c55e','#ffffff'];
  const fire = (r, o) => confetti({ ...o, origin: { y: .6 }, particleCount: Math.floor(300 * r), colors });
  fire(.25, { spread: 26, startVelocity: 55 }); fire(.2, { spread: 60 });
  fire(.35, { spread: 100, decay: .91, scalar: .8 }); fire(.1, { spread: 120, startVelocity: 25, decay: .92, scalar: 1.2 });
  fire(.1, { spread: 120, startVelocity: 45 });
  confetti({ particleCount: 80, spread: 360, ticks: 200, gravity: 0, decay: .96, startVelocity: 20, colors, shapes: ['star'], origin: { x: .5, y: .4 } });
}

function blastLevelConfetti() {
  const colors = ['#10ffd4','#a855f7','#f59e0b','#00d4ff','#ffffff','#f43f5e'];
  confetti({ particleCount: 100, angle: 60, spread: 65, origin: { x: 0 }, colors });
  confetti({ particleCount: 100, angle: 120, spread: 65, origin: { x: 1 }, colors });
  setTimeout(() => {
    confetti({ particleCount: 80, spread: 360, ticks: 180, gravity: .5, decay: .94, startVelocity: 28, colors, shapes: ['star'], origin: { x: .5, y: .45 } });
  }, 200);
}

/* ═══════════════════════════════════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════════════════════════════════ */

/* ── Progress Ring ─────────────────────────────────────────────────────── */
function ProgressRing({ pct, size = 180, sw = 12 }) {
  const r = (size - sw) / 2, c = 2 * Math.PI * r, offset = c - (pct / 100) * c;
  const color = pct >= 100 ? '#22c55e' : pct >= 66 ? '#10ffd4' : '#00d4ff';
  return (
    <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
      <div className="absolute rounded-full" style={{ width: size, height: size, boxShadow: `0 0 40px ${color}44,0 0 80px ${color}22` }} />
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="absolute">
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#1e2028" strokeWidth={sw} />
        <circle className="progress-ring-circle" cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color}
          strokeWidth={sw} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset}
          style={{ filter: `drop-shadow(0 0 6px ${color})` }} />
      </svg>
      <div className="relative flex flex-col items-center justify-center z-10">
        <span className="font-black font-mono leading-none" style={{ fontSize: size * .22, color, textShadow: `0 0 16px ${color}` }}>{Math.round(pct)}%</span>
        <span className="text-xs font-semibold tracking-widest mt-1" style={{ color: '#64748b' }}>COMPLETE</span>
      </div>
    </div>
  );
}

/* ── Level Badge ───────────────────────────────────────────────────────── */
function LevelBadge({ level, size = 'md' }) {
  const isLg = size === 'lg';
  const dim = isLg ? 'w-20 h-20' : 'w-14 h-14';
  const numSz = isLg ? 'text-3xl' : 'text-xl';
  return (
    <div className={`level-badge ${dim}`}
      style={{ background: 'linear-gradient(135deg,rgba(168,85,247,.18),rgba(16,255,212,.1))', border: '1px solid rgba(168,85,247,.5)', boxShadow: '0 0 24px rgba(168,85,247,.25),0 0 48px rgba(16,255,212,.08)' }}>
      <span className="text-xs font-bold tracking-widest text-slate-500">LVL</span>
      <span className={`font-black ${numSz} leading-none`} style={{ color: '#a855f7', textShadow: '0 0 14px rgba(168,85,247,.9)' }}>{level}</span>
    </div>
  );
}

/* ── XP Bar ────────────────────────────────────────────────────────────── */
function XPBar({ totalXP, userLevel }) {
  const title = getTitle(userLevel);
  const emoji = getLvlEmoji(userLevel);
  const xpInLvl = calcXpInLevel(totalXP);
  const xpPct = calcXpPct(totalXP);
  const xpToNext = XP_PER_LEVEL - xpInLvl;
  const nextTitle = getTitle(userLevel + 1);

  return (
    <div className="rounded-2xl p-5 mb-6" style={{ background: 'linear-gradient(135deg,#161820 0%,#1a1c28 100%)', border: '1px solid rgba(168,85,247,.2)', boxShadow: '0 4px 32px rgba(168,85,247,.08)' }}>
      {/* Top row */}
      <div className="flex items-center justify-between gap-4 mb-4">
        <div className="flex items-center gap-4 min-w-0">
          <LevelBadge level={userLevel} />
          <div className="min-w-0">
            <div className="flex items-center gap-2 mb-0.5">
              <span className="text-xl">{emoji}</span>
              <h3 className="xp-shimmer-text font-black text-xl leading-tight truncate">{title}</h3>
            </div>
            <p className="text-xs font-mono text-slate-500 tracking-wider">TOTAL XP: <span className="text-purple-400 font-bold">{totalXP.toLocaleString()}</span></p>
          </div>
        </div>
        <div className="text-right flex-shrink-0">
          <p className="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-0.5">Next Level</p>
          <p className="font-mono font-black text-sm" style={{ color: '#10ffd4', textShadow: '0 0 10px rgba(16,255,212,.7)' }}>{xpToNext} XP</p>
          <p className="text-xs text-slate-600 truncate max-w-32">{nextTitle}</p>
        </div>
      </div>

      {/* XP Progress Bar */}
      <div>
        <div className="flex justify-between items-center mb-1.5">
          <span className="text-xs font-mono text-slate-500">Level {userLevel}</span>
          <span className="text-xs font-mono font-bold" style={{ color: '#a855f7' }}>{xpInLvl} / {XP_PER_LEVEL} XP</span>
          <span className="text-xs font-mono text-slate-500">Level {userLevel + 1}</span>
        </div>
        <div className="xp-bar-track">
          <div className="xp-bar-fill" style={{ width: `${xpPct}%`, background: 'linear-gradient(90deg,#a855f7,#00d4ff,#10ffd4)', boxShadow: '0 0 12px rgba(168,85,247,.5),0 0 24px rgba(16,255,212,.2)' }} />
        </div>
        <div className="flex justify-end mt-1">
          <span className="text-xs font-mono text-slate-600">{Math.round(xpPct)}% to next level</span>
        </div>
      </div>
    </div>
  );
}

/* ── Flame Streak Badge ────────────────────────────────────────────────── */
function FlameStreak({ streakCount, lastCompletedDate }) {
  const isBroken = streakCount === 0 && !lastCompletedDate;
  const isAlive = streakCount > 0;
  return (
    <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full ${isAlive ? 'streak-badge' : 'streak-broken'}`}>
      <span className={`text-base ${isAlive ? 'flame-flicker' : ''}`}>{isAlive ? '🔥' : '💤'}</span>

          <div>

              style={{ color: accentColor, background: `${accentColor}18`, border: `1px solid ${accentColor}40` }}>{habit.category}</span>

      <div className="mb-4">

          <span className="text-xs text-slate-500 font-medium tracking-wider uppercase">Target</span>

      {/* Completed banner */}
      {completedToday && (
        <div className="mt-4 rounded-xl py-2 px-4 flex items-center justify-center gap-2"
          style={{ background: `${accentColor}15`, border: `1px solid ${accentColor}30` }}>
          <span className="text-xs font-bold tracking-widest" style={{ color: accentColor }}>✦ LOGGED +{XP_PER_TASK} XP EARNED ✦</span>
        </div>
      )}
    </div>
  );
}

/* ── Stats Row ─────────────────────────────────────────────────────────── */
function StatsRow({ habits, habitsState, totalXP, userLevel }) {
  const done = habits.filter(h => habitsState[h.id]?.completedToday).length;
  const best = habits.reduce((m, h) => Math.max(m, habitsState[h.id]?.streakCount || 0), 0);
  const title = getTitle(userLevel);
  const stats = [
    { label: "Today's Wins",  value: `${done}/${habits.length}`, color: '#00d4ff', icon: '⚡' },
    { label: 'Total XP',     value: totalXP.toLocaleString(),   color: '#a855f7', icon: '💎' },
    { label: 'Best Streak',  value: `${best}d`,                  color: '#f59e0b', icon: '🔥' },
    { label: 'Dad Status',   value: done === habits.length && habits.length > 0 ? 'LEGEND' : title.split(' ')[0].toUpperCase(), color: done === habits.length && habits.length > 0 ? '#22c55e' : '#64748b', icon: '🏆' },
  ];
  return (
    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      {stats.map(s => (
        <div key={s.label} className="rounded-2xl p-4" style={{ background: '#161820', border: '1px solid #2a2d3a', boxShadow: '0 4px 24px rgba(0,0,0,0.3)' }}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">{s.icon}</span>
            <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">{s.label}</span>
          </div>
          <span className="font-black font-mono text-2xl" style={{ color: s.color, textShadow: `0 0 12px ${s.color}88` }}>{s.value}</span>
        </div>
      ))}
    </div>
  );
}

═══════════════════════════════════════════════════════════════════════════ */
function App() {
  const resolved = useMemo(() => resolveAll(), []);

  const [habits, setHabits] = useState(resolved.habits);
  const [habitsState, setHabitsState] = useState(resolved.habitsState);
  const [totalXP, setTotalXP] = useState(resolved.totalXP);
  const [userLevel, setUserLevel] = useState(resolved.userLevel);

  // UI state
  const [editMode, setEditMode] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [showCompletion, setShowCompletion] = useState(false);
  const [levelUpInfo, setLevelUpInfo] = useState(null);   // { level, title }
  const [deleteTarget, setDeleteTarget] = useState(null); // { id, title }
  const [xpFloaters, setXpFloaters] = useState([]);       // [{ id, habitId }]

  const completionFired = useRef(false);

  /* ── Persist all state ───────────────────────────────────────────────── */
  useEffect(() => { saveAll(habits, habitsState, totalXP, userLevel); }, [habits, habitsState, totalXP, userLevel]);

  /* ── Derived ─────────────────────────────────────────────────────────── */
  const done = useMemo(() => habits.filter(h => habitsState[h.id]?.completedToday).length, [habits, habitsState]);
  const pct  = habits.length > 0 ? (done / habits.length) * 100 : 0;

  /* ── 100% Completion trigger ─────────────────────────────────────────── */
  useEffect(() => {
    if (pct >= 100 && habits.length > 0 && !completionFired.current && !editMode) {
      completionFired.current = true;
      setTimeout(() => { blastCompletionConfetti(); setShowCompletion(true); }, 500);
    }
    if (pct < 100) completionFired.current = false;
  }, [pct, editMode, habits.length]);

  /* ── XP Floater helper ───────────────────────────────────────────────── */
  const triggerXPFloat = (habitId) => {
    const id = genId();
    setXpFloaters(f => [...f, { id, habitId }]);
    setTimeout(() => setXpFloaters(f => f.filter(x => x.id !== id)), 1600);
  };

  /* ── Toggle habit ────────────────────────────────────────────────────── */
  const toggle = (habitId) => {
    if (editMode) return;
    const current = habitsState[habitId];
    if (!current) return;
    const nowCompleted = !current.completedToday;

    if (nowCompleted) {
      // Award XP + increment streak
      const newXP  = totalXP + XP_PER_TASK;
      const oldLvl = calcLevel(totalXP);
      const newLvl = calcLevel(newXP);

      setHabitsState(prev => ({
        ...prev,
        [habitId]: { completedToday: true, streakCount: current.streakCount + 1, lastCompletedDate: TODAY },
      }));
      setTotalXP(newXP);
      setUserLevel(newLvl);
      triggerXPFloat(habitId);

      // Level up?
      if (newLvl > oldLvl) {
        setTimeout(() => {
          setLevelUpInfo({ level: newLvl, title: getTitle(newLvl) });
          blastLevelConfetti();
        }, 400);
      }
    } else {
      // Remove XP + decrement streak
      const newXP     = Math.max(0, totalXP - XP_PER_TASK);
      const newStreak = Math.max(0, current.streakCount - 1);
      setHabitsState(prev => ({
        ...prev,
        [habitId]: { ...current, completedToday: false, streakCount: newStreak },
      }));
      setTotalXP(newXP);
      setUserLevel(calcLevel(newXP));
    }
  };

  /* ── Edit mode ───────────────────────────────────────────────────────── */
  const toggleEditMode = () => { setEditMode(e => !e); setEditingId(null); setShowAddForm(false); };
  const startEdit  = (id)       => { setEditingId(id); setShowAddForm(false); };
  const saveEdit   = (id, form) => { setHabits(h => h.map(x => x.id === id ? { ...x, ...form } : x)); setEditingId(null); };
  const initiateDelete = (id)   => { const h = habits.find(x => x.id === id); setDeleteTarget({ id, title: h?.title || 'this metric' }); };

  const confirmDelete = () => {
    if (!deleteTarget) return;
    const { id } = deleteTarget;
    setHabits(h => h.filter(x => x.id !== id));
    setHabitsState(s => { const n = { ...s }; delete n[id]; return n; });
    if (editingId === id) setEditingId(null);
    setDeleteTarget(null);
  };

  const addHabit = (form) => {
    setHabits(h => [...h, form]);
    setHabitsState(s => ({ ...s, [form.id]: mkDefaultHabitState() }));
    setShowAddForm(false);
  };

  /* ── Render ──────────────────────────────────────────────────────────── */
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  return (
    <div className="min-h-screen grid-bg" style={{ background: '#0d0e12' }}>

      {/* ════════════════ HEADER ════════════════ */}
      <header className="relative overflow-hidden">
        {/* Cyan top line */}
        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-px rounded-full"
          style={{ background: 'linear-gradient(90deg,transparent,#00d4ff,#10ffd4,#a855f7,#00d4ff,transparent)' }} />
        {/* Ambient glow */}
        <div className="absolute -top-24 left-1/2 -translate-x-1/2 w-96 h-48 rounded-full opacity-20 blur-3xl"
          style={{ background: 'radial-gradient(ellipse,#a855f7 0%,#00d4ff 50%,transparent 70%)' }} />

        <div className="max-w-6xl mx-auto px-6 pt-10 pb-8 relative z-10">
          {/* Top bar: live badge + edit toggle */}
          <div className="flex items-center justify-between mb-5">
            <div className="flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase"
              style={{ background: 'rgba(0,212,255,0.1)', border: '1px solid rgba(0,212,255,0.3)', color: '#00d4ff' }}>
              <span className="inline-block w-1.5 h-1.5 rounded-full pulse-ring" style={{ background: '#00d4ff' }} />
              LIVE PERFORMANCE TRACKER
            </div>
            <button id="edit-mode-toggle" onClick={toggleEditMode}
              className="flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-xs tracking-wider transition-all"
              style={editMode
                ? { background: 'linear-gradient(135deg,#f43f5e,#e11d48)', color: '#fff', boxShadow: '0 0 20px rgba(244,63,94,.4)', border: '1px solid rgba(244,63,94,.5)' }
                : { background: '#1e2028', border: '1px solid #3a3d4a', color: '#94a3b8' }}>
              {editMode ? <>✕ Done Editing</> : <>✏ Manage Metrics</>}
            </button>
          </div>

          {/* Dashboard title */}
          <h1 className="shimmer-text text-center font-black tracking-tight leading-none mb-2"
            style={{ fontSize: 'clamp(1.8rem,5vw,3.5rem)' }}>
            DAD'S PERFORMANCE DASHBOARD
          </h1>

          {/* Level + Title sub-header */}
          <div className="flex items-center justify-center gap-3 mb-2">
            <LevelBadge level={userLevel} />
            <div className="text-center">
              <p className="xp-shimmer-text font-black text-xl leading-tight">{getTitle(userLevel)}</p>
              <p className="text-xs font-mono text-slate-500 uppercase tracking-widest">Current Rank · Level {userLevel}</p>
            </div>
          </div>

          {/* Birthday line */}
          <p className="text-center font-semibold text-base text-slate-300 mb-1">
            🎂 Happy Birthday, Dad! Time to crush today's metrics. 🎂
          </p>
          <p className="text-center text-xs font-mono text-slate-600 tracking-wider mb-6">{today.toUpperCase()}</p>

          {/* Edit mode banner */}
          {editMode && (
            <div className="flex items-center justify-center mb-5">
              <div className="flex items-center gap-3 px-6 py-3 rounded-2xl text-sm font-semibold"
                style={{ background: 'rgba(244,63,94,.08)', border: '1px solid rgba(244,63,94,.3)', color: '#f43f5e' }}>
                <span className="text-base">✏</span>
                <span>Edit Mode — ✕ delete · ✏ rename/recolor · <span style={{ color: '#a855f7' }}>＋</span> add new metrics</span>
              </div>
            </div>
          )}

          {/* XP Bar (normal mode only) */}
          {!editMode && <XPBar totalXP={totalXP} userLevel={userLevel} />}

          {/* Completion ring (normal mode only) */}
          {!editMode && (
            <div className="flex flex-col items-center gap-3">
              <ProgressRing pct={pct} />
              <p className="text-sm font-semibold" style={{ color: pct >= 100 ? '#22c55e' : '#00d4ff' }}>
                {pct >= 100
                  ? '✦ All Metrics Achieved — Elite Performance ✦'
                  : pct > 0 ? `${done} of ${habits.length} habits logged today`
                  : 'Tap a card below to earn XP'}
              </p>
            </div>
          )}
        </div>

        {/* Divider */}
        <div className="w-full h-px" style={{ background: 'linear-gradient(90deg,transparent 0%,#2a2d3a 20%,#2a2d3a 80%,transparent 100%)' }} />
      </header>

      {/* ════════════════ MAIN ════════════════ */}
      <main className="max-w-6xl mx-auto px-6 py-10">
        {!editMode && <StatsRow habits={habits} habitsState={habitsState} totalXP={totalXP} userLevel={userLevel} />}

        {/* Section label */}
        <div className="flex items-center gap-4 mb-6">
          <h2 className="font-bold text-sm tracking-widest uppercase" style={{ color: editMode ? '#f43f5e' : '#64748b' }}>
            {editMode ? '✏ Metric Manager' : "Today's Mission Log"}
          </h2>
          <div className="flex-1 h-px" style={{ background: editMode ? 'rgba(244,63,94,.2)' : '#2a2d3a' }} />
          <span className="text-xs font-mono" style={{ color: editMode ? '#a855f7' : '#475569' }}>
            {editMode ? `${habits.length} METRIC${habits.length !== 1 ? 'S' : ''}` : `${done}/${habits.length} COMPLETE`}
          </span>
        </div>

        {/* Cards grid */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
          {habits.map((h, i) => (
            <div key={h.id} style={{ animationDelay: `${i * .08}s`, animation: 'fadeUp .4s ease both' }}>
              {editMode && editingId === h.id ? (
                <EditCardPanel habit={h} onSave={form => saveEdit(h.id, form)} onCancel={() => setEditingId(null)} />
              ) : (
                <HabitCard
                  habit={h}
                  state={habitsState[h.id] || mkDefaultHabitState()}
                  onToggle={() => toggle(h.id)}
                  editMode={editMode}
                  onDelete={initiateDelete}
                  onEdit={startEdit}
                  xpFloaters={xpFloaters}
                />
              )}
            </div>
          ))}

          {/* Add metric placeholder (edit mode) */}
          {editMode && (
            <div style={{ animation: 'fadeUp .4s ease both' }}>
              {showAddForm ? (
                <AddTaskPanel habits={habits} onAdd={addHabit} onCancel={() => setShowAddForm(false)} />
              ) : (
                <button id="add-metric-btn" onClick={() => setShowAddForm(true)}
                  className="w-full min-h-40 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all"
                  style={{ background: 'rgba(168,85,247,.05)', border: '2px dashed rgba(168,85,247,.35)', color: '#a855f7' }}
                  onMouseEnter={e => { e.currentTarget.style.background = 'rgba(168,85,247,.1)'; e.currentTarget.style.borderColor = 'rgba(168,85,247,.6)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(168,85,247,.05)'; e.currentTarget.style.borderColor = 'rgba(168,85,247,.35)'; }}>
                  <span className="text-4xl">＋</span>
                  <span className="text-sm font-bold tracking-wider">Add New Metric</span>
                  <span className="text-xs text-slate-500">Create a custom daily goal</span>
                </button>
              )}
            </div>
          )}
        </div>

        {/* Empty state */}
        {habits.length === 0 && !editMode && (
          <div className="text-center py-20">
            <div className="text-5xl mb-4">📋</div>
            <p className="text-slate-400 font-semibold mb-2">No metrics yet!</p>
            <p className="text-slate-600 text-sm">Click <span className="text-slate-400 font-semibold">"Manage Metrics"</span> to add your first goal.</p>
          </div>
        )}

        {/* Wisdom card */}
        {!editMode && (
          <div className="rounded-2xl p-6 flex flex-col sm:flex-row items-center gap-6 mb-8"
            style={{ background: 'linear-gradient(135deg,#161820 0%,#1e2028 100%)', border: '1px solid #2a2d3a' }}>
            <div className="flex-1">
              <p className="text-xs font-bold tracking-widest uppercase text-slate-500 mb-1">Daily Wisdom</p>
              <blockquote className="text-lg font-semibold text-slate-200 leading-relaxed">
                "Discipline is choosing between what you want now and what you want most."
              </blockquote>
              <p className="text-sm text-slate-500 mt-2">— Keep going, Champion</p>
            </div>
            <div className="w-px h-16 hidden sm:block" style={{ background: 'linear-gradient(to bottom,transparent,#2a2d3a,transparent)' }} />
            <div className="flex flex-col items-center gap-2">
              <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl" style={{ background: 'rgba(245,158,11,.1)', border: '1px solid rgba(245,158,11,.3)' }}>🎯</div>
              <span className="text-xs font-mono font-bold text-amber-400">STAY LOCKED IN</span>
            </div>
          </div>
        )}

        <footer className="text-center pb-8">
          <p className="text-xs text-slate-600 font-medium">
            Built with ❤️ as a birthday gift · XP & streaks persist automatically ·{' '}
            <span className="text-slate-500">Streaks reset if you miss a day</span>
          </p>
        </footer>
      </main>

      {/* ════════════════ MODALS ════════════════ */}
      {showCompletion && !editMode && <CompletionOverlay onClose={() => setShowCompletion(false)} />}
      {levelUpInfo && <LevelUpModal info={levelUpInfo} onClose={() => setLevelUpInfo(null)} />}
      {deleteTarget && <DeleteConfirm habitTitle={deleteTarget.title} onConfirm={confirmDelete} onCancel={() => setDeleteTarget(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
